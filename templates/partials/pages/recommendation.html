        <div id="page-recommendation" class="page-panel module-page hidden space-y-6">
            <div class="group-card">
                <div class="flex flex-wrap justify-between gap-3 items-center mb-4">
                    <div>
                        <h3 class="group-title mb-2">资源推荐</h3>
                        <div class="text-xs text-slate-400">浏览热门影视，搜索资源或创建订阅。</div>
                    </div>
                    <div class="flex items-center gap-3 flex-wrap">
                        <div class="text-xs px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-slate-300 rec-watchlist-badge">
                            想看清单：<span id="recommendation-watchlist-count" class="text-sky-400 font-bold">0</span> 部
                        </div>
                    </div>
                </div>

                <div class="rec-tab-bar">
                    <button onclick="loadRecommendationTrending('day')" class="rec-tab-btn" data-rec-tab="trending-day">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"/></svg>
                        今日热榜
                    </button>
                    <button onclick="loadRecommendationTrending('week')" class="rec-tab-btn is-active" data-rec-tab="trending-week">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        本周热榜
                    </button>
                    <button onclick="loadRecommendationPopular('movie')" class="rec-tab-btn" data-rec-tab="popular-movie">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm3 2h6v4H7V5zm8 8v2h1V5h-1v2h-2V5H9v2H7V5H6v10h1v-2h2v2h2v-2h2v2h1z" clip-rule="evenodd"/></svg>
                        热门电影
                    </button>
                    <button onclick="loadRecommendationPopular('tv')" class="rec-tab-btn" data-rec-tab="popular-tv">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm1 10a1 1 0 011-1h1a1 1 0 110 2H6a1 1 0 01-1-1zm5-1a1 1 0 100 2h3a1 1 0 100-2H10z" clip-rule="evenodd"/></svg>
                        热门剧集
                    </button>
                    <button onclick="showRecommendationExplore()" class="rec-tab-btn" data-rec-tab="explore">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
                        探索发现
                    </button>
                    <button onclick="showRecommendationWatchlist()" class="rec-tab-btn" data-rec-tab="watchlist">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="rec-tab-icon"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/></svg>
                        想看清单
                    </button>
                </div>

                <div class="rec-search-strip">
                    <div class="rec-search-input-wrap">
                        <svg class="rec-search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
                        <input id="recommendation-search-input" class="rec-search-input" placeholder="搜索 TMDB 影视名称" onkeydown="if(event.key==='Enter')searchRecommendationTmdb()" oninput="onRecommendationSearchInput()">
                        <button id="recommendation-search-clear" class="rec-search-clear hidden" onclick="clearRecommendationSearch()" title="清除搜索">
                            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                        </button>
                    </div>
                    <select id="recommendation-media-type" class="rec-search-select">
                        <option value="all">全部</option>
                        <option value="movie">电影</option>
                        <option value="tv">剧集</option>
                    </select>
                    <button onclick="searchRecommendationTmdb()" class="rec-search-btn">搜索</button>
                </div>
                <div id="rec-explore-filters" class="rec-explore-filters hidden">
                    <div class="rec-explore-row">
                        <select id="rec-explore-media-type" class="rec-search-select" onchange="onExploreMediaTypeChange()">
                            <option value="movie">电影</option>
                            <option value="tv">剧集</option>
                        </select>
                        <select id="rec-explore-sort" class="rec-search-select">
                            <option value="popularity.desc">最热门</option>
                            <option value="vote_average.desc">最高评分</option>
                            <option value="primary_release_date.desc">最新上映</option>
                        </select>
                        <select id="rec-explore-language" class="rec-search-select">
                            <option value="">全部语言</option>
                            <option value="zh">中文</option>
                            <option value="en">英语</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                            <option value="th">泰语</option>
                            <option value="fr">法语</option>
                            <option value="de">德语</option>
                            <option value="es">西班牙语</option>
                        </select>
                        <button onclick="searchRecommendationDiscover()" class="rec-search-btn">探索</button>
                        <button onclick="resetExploreFilters()" class="rec-search-btn rec-btn-reset">重置</button>
                    </div>
                    <div class="rec-explore-row rec-explore-row-advanced">
                        <div class="rec-filter-group" style="flex:1;min-width:0;">
                            <label class="rec-filter-label">年代</label>
                            <div id="rec-explore-decade-chips" class="rec-decade-chips"></div>
                        </div>
                        <div class="rec-filter-group">
                            <label class="rec-filter-label">评分</label>
                            <input id="rec-explore-rating" class="rec-search-input rec-input-sm" placeholder="最低" type="number" min="0" max="10" step="0.5">
                        </div>
                        <div class="rec-filter-group">
                            <label class="rec-filter-label">投票数</label>
                            <input id="rec-explore-vote-count" class="rec-search-input rec-input-sm" placeholder="最低" type="number" min="0" step="100">
                        </div>
                        <div class="rec-filter-group">
                            <label class="rec-filter-label">片长(分钟)</label>
                            <div class="rec-range-inputs">
                                <input id="rec-explore-runtime-gte" class="rec-search-input rec-input-sm" placeholder="最短" type="number" min="0" step="10">
                                <span class="rec-range-sep">-</span>
                                <input id="rec-explore-runtime-lte" class="rec-search-input rec-input-sm" placeholder="最长" type="number" min="0" step="10">
                            </div>
                        </div>
                    </div>
                    <div id="rec-explore-genres" class="rec-explore-genres"></div>
                </div>
            </div>

            <div class="group-card">
                <div id="recommendation-content-header" class="flex justify-between items-center mb-4">
                    <h4 id="recommendation-content-title" class="text-sm font-bold text-slate-300">本周热榜</h4>
                    <div id="recommendation-loading" class="hidden flex items-center gap-2 text-xs text-slate-500">
                        <svg class="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
                        加载中...
                    </div>
                </div>
                <div id="recommendation-grid" class="rec-grid"></div>
                <div id="recommendation-pagination" class="rec-pagination hidden"></div>
                <div id="recommendation-empty" class="hidden py-16 text-center">
                    <div id="recommendation-empty-icon" class="text-slate-600 mb-2">
                        <svg class="w-12 h-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M7 4V2m0 2a2 2 0 012 2v8a2 2 0 01-2 2m0-12a2 2 0 00-2 2v8a2 2 0 002 2m0 0v2m10-12V2m0 2a2 2 0 00-2 2v8a2 2 0 002 2m0-12a2 2 0 012 2v8a2 2 0 01-2 2m0 0v2"/></svg>
                    </div>
                    <div id="recommendation-empty-text" class="text-sm text-slate-500">暂无内容</div>
                    <div id="recommendation-empty-hint" class="text-xs text-slate-600 mt-1 hidden"></div>
                </div>
            </div>

            <div id="rec-detail-modal" class="rec-detail-modal hidden fixed inset-0 z-[55]">
                <div class="rec-detail-backdrop" onclick="closeRecDetail()"></div>
                <div class="rec-detail-shell">
                    <div id="rec-detail-content"></div>
                </div>
            </div>
        </div>
